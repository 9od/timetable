<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>아이 시간표</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Gmarket+Sans:wght@300;400;500&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles/base.css" />
  <link rel="stylesheet" href="./styles/layout.css" />
  <link rel="stylesheet" href="./styles/components.css" />
  <link rel="stylesheet" href="./styles/timetable.css" />
  <link rel="stylesheet" href="./styles/modal.css" />
</head>
<body>
  <div class="pg">
    <header class="hdr">
      <div class="logo">아이 <em>시간표</em><small>학교 · 학원 통합 관리</small></div>
      <div class="ctabs" id="childTabs"></div>
    </header>

    <section class="srow">
      <div class="sc"><div class="slbl">이번 달 학원비</div><div class="sval vp" id="statCost">₩0</div></div>
      <div class="sc"><div class="slbl">주간 학원 수업</div><div class="sval vt" id="statCount">0 회</div></div>
      <div class="sc"><div class="slbl">주간 학원 시간</div><div class="sval vo" id="statHours">0 시간</div></div>
      <div class="sc"><div class="slbl">등록 학원 수</div><div class="sval vb" id="statAcademies">0 곳</div></div>
    </section>

    <section class="tb">
      <div class="tbL">
        <div class="tabset" id="modeTabs">
          <button class="tabbtn on" data-mode="academy">🎒 학원</button>
          <button class="tabbtn" data-mode="school">🏫 학교</button>
        </div>
        <div class="tabset" id="viewTabs">
          <button class="tabbtn on" data-view="timetable">시간표</button>
          <button class="tabbtn" data-view="stats">통계</button>
          <button class="tabbtn" data-view="list">목록</button>
        </div>
      </div>
      <span id="dataSourceBadge" class="data-source-badge"></span>
      <button class="addbtn secondary" id="saveButton">💾 저장</button>
      <button class="addbtn" id="addButton">+ 추가</button>
    </section>

    <main>
      <section id="viewTimetable">
        <div class="legend" id="legend"></div>
        <div class="ttwrap">
          <div class="ttgrid" id="timetableGrid"></div>
        </div>
      </section>

      <section id="viewStats" hidden>
        <div class="srow compact" id="statsSummary"></div>
        <div class="chart-card">
          <div class="chart-title">요일별 학원 시간 통계</div>
          <div class="chart-box" id="dayChart"></div>
        </div>
        <div class="chart-card">
          <div class="chart-title">과목별 주간 시간 통계</div>
          <div class="chart-box" id="subjectChart"></div>
        </div>
      </section>

      <section id="viewList" hidden>
        <div class="lwrap">
          <div class="lhdr"><span>전체 수업 목록</span><span id="listCount"></span></div>
          <div id="eventList"></div>
        </div>
      </section>
    </main>
  </div>

  <div class="overlay" id="academyModal" aria-hidden="true">
    <div class="modal">
      <div class="mhdr">
        <div class="mtitle" id="academyModalTitle">🎒 학원 등록 <span class="mbadge ba">학원</span></div>
        <button class="mclose" data-close="academyModal">✕</button>
      </div>
      <div class="mbody">
        <input type="hidden" id="academyEditId" />
        <div class="frow fcols2">
          <div class="fgroup"><label>학원명 *</label><input id="academyName" type="text" placeholder="예: 폴리영어" /></div>
          <div class="fgroup"><label>학원 색상</label><input id="academyColor" type="color" /></div>
        </div>
        <div class="frow fcols3">
          <div class="fgroup"><label>월 비용</label><input id="academyCost" type="number" min="0" placeholder="350000" /></div>
          <div class="fgroup"><label>이동시간(분)</label><input id="academyTransit" type="number" min="0" max="120" step="5" placeholder="0" /></div>
          <div class="fgroup"><label>메모</label><input id="academyMemo" type="text" placeholder="셔틀, 준비물 등" /></div>
        </div>
        <div class="subj-panel">
          <div class="subj-panel-title">📚 과목 / 요일별 수업 시간</div>
          <div class="subj-list" id="subjectEditor"></div>
          <button class="btn-add-subj" id="addSubjectButton">+ 과목 추가</button>
        </div>
        <div class="mactions">
          <button class="btn btnp" id="saveAcademyButton">저장</button>
          <button class="btn danger" id="deleteAcademyButton" hidden>삭제</button>
          <button class="btn" data-close="academyModal">취소</button>
        </div>
      </div>
    </div>
  </div>

  <div class="overlay" id="schoolModal" aria-hidden="true">
    <div class="modal">
      <div class="mhdr">
        <div class="mtitle">🏫 학교 시간 등록 <span class="mbadge bs">학교</span></div>
        <button class="mclose" data-close="schoolModal">✕</button>
      </div>
      <div class="mbody">
        <p class="hint">학교 시간은 요일별 종료시간만 입력합니다. 시작은 항상 09:00으로 표시됩니다.</p>
        <div class="school-days" id="schoolEditor"></div>
        <div class="mactions">
          <button class="btn btnp" id="saveSchoolButton">저장</button>
          <button class="btn" data-close="schoolModal">취소</button>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="https://code.highcharts.com/highcharts.js"></script>
  <script type="module" src="./scripts/app.js"></script>
</body>
</html>
